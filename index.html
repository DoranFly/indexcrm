<script>
    const { createApp, ref, onMounted } = Vue;

    const SUPABASE_URL = 'https://ufecxdwqmhkxhsfmwrfn.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_nnGYFPU5nAEiTda2RIDo9g_923K_NnO';
    
    // On utilise un nom différent pour éviter le conflit
    const sbc = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    createApp({
        setup() {
            const tab = ref('dashboard');
            const isConnected = ref(false);
            const companies = ref([]);
            
            const menu = [
                { id: 'dashboard', label: 'Dashboard', icon: 'layout-grid' },
                { id: 'projets', label: 'Missions', icon: 'briefcase' }
            ];

            const refreshData = async () => {
                const { data, error } = await sbc.from('companies').select('*');
                if (!error) {
                    companies.value = data;
                    isConnected.value = true;
                }
            };

            onMounted(refreshData);

            return { tab, menu, companies, isConnected, refreshData };
        }
    }).mount('#app');
</script>
